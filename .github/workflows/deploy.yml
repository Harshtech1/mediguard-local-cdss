name: 🚀 Deploy MediGuard to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build & Lint ─────────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: 🏗️ Build (inject env secrets from GitHub Secrets)
        env:
          VITE_GROQ_API_KEY:               ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY:      ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL:               ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:          ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ELEVENLABS_API_KEY:         ${{ secrets.VITE_ELEVENLABS_API_KEY }}
          VITE_ELEVENLABS_VOICE_ID:        ${{ secrets.VITE_ELEVENLABS_VOICE_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY:     ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Deploy to Vercel ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ⬇️ Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🚀 Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
